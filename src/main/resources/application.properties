# Spring 应用名称，用于日志和运行时标识。
spring.application.name=agent-travel-assistant-agentscope

# AgentScope Agent 名称。
travel.agent.name=TravelAssistant
# Harness Workspace 中的稳定 Agent ID。
travel.agent.agent-id=travel-assistant
# OpenAI 兼容接口中的模型名称。
#travel.agent.model=Qwen/Qwen3-235B-A22B-Instruct-2507
travel.agent.model=Qwen/Qwen3-8B
# 模型服务基础地址，这里使用 ModelScope 的 OpenAI 兼容接口。
travel.agent.base-url=https://api-inference.modelscope.cn/v1
# 读取模型访问令牌的环境变量名，避免把密钥写入仓库。
travel.agent.api-key-env=MODELSCOPE_API_KEY
# HarnessAgent 单次回答允许的最大推理/工具调用轮数。
travel.agent.max-iters=6
# Redis 上下文缺失时，从 MySQL 恢复的最近消息数量。
travel.agent.history-limit=20
# 单次模型调用等待超时时间。
travel.agent.timeout=180s
# AgentScope 状态在 Redis 中的保留时间。
travel.agent.state-ttl=24h
# Harness 本机 Workspace 根目录，保存 AGENTS.md、knowledge、memory 和 sessions。
travel.agent.workspace-dir=.agentscope/workspace/travel-assistant
# Workspace 记忆注入的最大上下文 token 预算。
travel.agent.max-context-tokens=8000
# 旅行策略 Markdown 产物根目录。
travel.agent.artifact-dir=.agentscope/workspace/travel-assistant/artifacts/travel-strategies
# Agent 单次运行日志本地保存目录。
travel.agent.run-log-dir=.agentscope/workspace/travel-assistant/logs/agent-runs

# MySQL 连接信息，用于保存业务会话和消息。
spring.datasource.url=jdbc:mysql://localhost:3306/travel_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=Root@123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# MyBatis 下划线字段自动映射到 Java 驼峰属性。
mybatis.configuration.map-underscore-to-camel-case=true
# 开发期执行幂等建表脚本；生产环境建议改为迁移工具管理。
spring.sql.init.mode=always

# Redis 连接信息，用于保存 AgentScope 多轮会话状态。
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
